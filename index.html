<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Teleprompter</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible&family=Courier+Prime&family=Inter&family=Lora&family=PT+Serif&display=swap" rel="stylesheet" />
</head>
<body>

  <!-- ── EDIT VIEW ─────────────────────────────────────────── -->
  <div id="edit-view" class="view active">
    <header class="toolbar">
      <h1 class="logo">Teleprompter</h1>
      <button id="start-btn" class="btn btn-primary">Start ▶</button>
    </header>

    <div class="format-bar">
      <button class="fmt-btn" data-cmd="bold"        title="Bold (⌘B)"><b>B</b></button>
      <button class="fmt-btn" data-cmd="italic"      title="Italic (⌘I)"><i>I</i></button>
      <button class="fmt-btn" data-cmd="underline"   title="Underline (⌘U)"><u>U</u></button>
      <div class="fmt-divider"></div>
      <div id="font-picker-wrap" class="font-picker-wrap">
        <button id="font-picker-btn" class="fmt-btn font-picker-btn" title="Font">System</button>
        <div id="font-picker-menu" class="font-picker-menu">
          <div class="font-opt" data-font="system-ui, sans-serif"                    style="font-family: system-ui, sans-serif">System</div>
          <div class="font-opt" data-font="'Inter', sans-serif"                       style="font-family: 'Inter', sans-serif">Inter</div>
          <div class="font-opt" data-font="'Atkinson Hyperlegible', sans-serif"       style="font-family: 'Atkinson Hyperlegible', sans-serif">Atkinson</div>
          <div class="font-opt" data-font="Georgia, serif"                            style="font-family: Georgia, serif">Georgia</div>
          <div class="font-opt" data-font="'Lora', serif"                             style="font-family: 'Lora', serif">Lora</div>
          <div class="font-opt" data-font="'Courier Prime', monospace"                style="font-family: 'Courier Prime', monospace">Courier</div>
          <div class="font-opt" data-font="'PT Serif', serif"                         style="font-family: 'PT Serif', serif">PT Serif</div>
        </div>
      </div>
      <div class="fmt-divider"></div>
      <button id="paste-btn" class="fmt-btn" title="Paste from clipboard">⎘</button>
    </div>

    <main class="editor-area">
      <div
        id="script-input"
        class="editor-content"
        contenteditable="true"
        spellcheck="false"
        data-placeholder="Paste or type your script here…"
      ></div>
    </main>
  </div>

  <!-- ── PROMPTER VIEW ─────────────────────────────────────── -->
  <div id="prompter-view" class="view">

    <!-- Scrolling text container -->
    <div id="scroll-container">
      <div id="scroll-content">
        <div id="script-text"></div>
        <!-- Spacer so text can scroll fully off screen -->
        <div id="scroll-spacer"></div>
      </div>
    </div>

    <!-- Cue / focus line -->
    <div id="focus-line"></div>

    <!-- Countdown overlay -->
    <div id="countdown-overlay"></div>

    <!-- HUD overlay (fades out during play) -->
    <div id="hud">
      <div class="hud-top">
        <button id="edit-btn" class="btn btn-ghost">← Edit</button>
        <span id="progress-label">0%</span>
        <span id="time-label"></span>
        <button id="fullscreen-btn" class="btn btn-ghost">⛶ Fullscreen</button>
      </div>

      <div class="hud-bottom">
        <button id="play-pause-btn" class="btn btn-primary btn-large">▶ Play</button>

        <label class="control-group">
          <span>Speed</span>
          <input type="range" id="speed-slider" min="1" max="25" value="5" />
          <span id="speed-val">5</span>
        </label>

        <button id="mirror-toggle" class="btn btn-ghost" title="Flip Horizontal">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
            <line x1="9" y1="2" x2="9" y2="16"/>
            <polyline points="5,5 2,9 5,13"/>
            <polyline points="13,5 16,9 13,13"/>
          </svg>
        </button>
        <button id="flip-v-toggle" class="btn btn-ghost" title="Flip Vertical">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
            <line x1="2" y1="9" x2="16" y2="9"/>
            <polyline points="5,5 9,2 13,5"/>
            <polyline points="5,13 9,16 13,13"/>
          </svg>
        </button>

        <button id="settings-btn" class="btn btn-ghost settings-gear" title="Settings">⚙</button>
      </div>
    </div>

    <!-- Settings panel -->
    <div id="settings-panel">
      <div class="settings-header">
        <span>Settings</span>
      </div>
      <div class="settings-body">

        <div class="setting-col">
          <span class="setting-label">Theme</span>
          <div class="theme-options">
            <label class="theme-opt" title="White on Black">
              <input type="radio" name="theme" value="dark" checked />
              <span class="theme-swatch dark"></span>
            </label>
            <label class="theme-opt" title="Black on White">
              <input type="radio" name="theme" value="light" />
              <span class="theme-swatch light"></span>
            </label>
            <label class="theme-opt" title="Amber — easy on the eyes">
              <input type="radio" name="theme" value="amber" />
              <span class="theme-swatch amber"></span>
            </label>
          </div>
        </div>

        <div class="setting-row">
          <span class="setting-label">Size</span>
          <input type="range" id="size-slider" min="20" max="120" value="48" />
          <span id="size-val">48</span>
        </div>

        <div class="setting-row">
          <span class="setting-label">Margins</span>
          <input type="range" id="margin-slider" min="0" max="25" value="8" />
          <span id="margin-val">8</span>
        </div>

        <label class="setting-row toggle">
          <span class="setting-label">Cue line</span>
          <input type="checkbox" id="cue-toggle" />
          <span class="toggle-track"></span>
        </label>

        <label class="setting-row toggle">
          <span class="setting-label">Tap to pause</span>
          <input type="checkbox" id="tap-pause-toggle" />
          <span class="toggle-track"></span>
        </label>

        <label class="setting-row toggle">
          <span class="setting-label">Countdown</span>
          <input type="checkbox" id="countdown-toggle" />
          <span class="toggle-track"></span>
        </label>

      </div>
      <button id="settings-close-btn" class="btn btn-ghost settings-gear settings-close-float">⚙</button>
    </div>

  </div>

  <script src="app.js"></script>
</body>
</html>
